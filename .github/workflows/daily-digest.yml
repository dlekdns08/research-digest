name: Daily Research Digest

on:
  schedule:
    # 07:00 KST = 22:00 UTC (전날). GHA schedule은 5~15분 지연될 수 있음.
    # arxiv-graph daily_crawl은 19:00 KST (10:00 UTC)에 끝나므로 그 이후로 충분.
    - cron: "0 22 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/daily-digest.yml"

permissions:
  issues: write

jobs:
  digest:
    name: Summarize & Email
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    env:
      DIGEST_ANTHROPIC_API_KEY: ${{ secrets.DIGEST_ANTHROPIC_API_KEY }}
      DIGEST_SMTP_PASSWORD: ${{ secrets.DIGEST_SMTP_PASSWORD }}
      DIGEST_VOYAGE_API_KEY: ${{ secrets.DIGEST_VOYAGE_API_KEY }}
      DIGEST_EMAIL_FROM: dlekdns08@gmail.com
      DIGEST_EMAIL_TO: dlekdns07@naver.com
      # arxiv-graph는 별도 runner에서 돌지만 같은 서버라 DB 파일을 직접 읽음.
      # 이 digest runner가 root로 돌지 않을 수 있으니 절대경로로 고정.
      DIGEST_ARXIV_DB_PATH: /root/.arxiv-graph/data/arxiv_graph.db

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Verify arxiv-graph DB is readable
        run: |
          DB="$DIGEST_ARXIV_DB_PATH"
          if [ ! -r "$DB" ]; then
            echo "::error::arxiv-graph DB not readable at $DB"
            ls -la "$(dirname "$DB")" 2>/dev/null || true
            exit 2
          fi
          SIZE=$(stat -c%s "$DB" 2>/dev/null || stat -f%z "$DB")
          echo "arxiv-graph DB: $DB ($SIZE bytes)"

          # Diagnostic: inspect arxiv-graph DB contents so we can tell whether
          # "No papers found for the selected window" is a filter issue vs
          # an ingestion issue. Non-fatal: if sqlite3 is missing, warn & move on.
          if ! command -v sqlite3 >/dev/null 2>&1; then
            echo "::warning::sqlite3 not found; attempting install"
            if command -v sudo >/dev/null 2>&1; then
              sudo apt-get update -y >/dev/null 2>&1 || true
              sudo apt-get install -y sqlite3 >/dev/null 2>&1 || true
            else
              apt-get update -y >/dev/null 2>&1 || true
              apt-get install -y sqlite3 >/dev/null 2>&1 || true
            fi
          fi
          if command -v sqlite3 >/dev/null 2>&1; then
            echo "=== arxiv-graph DB stats ==="
            sqlite3 "file:$DB?mode=ro" -readonly \
              -cmd ".headers on" \
              -cmd ".mode column" \
              "SELECT COUNT(*) AS total_papers FROM papers;
               SELECT
                 SUM(CASE WHEN published_at >= datetime('now','-1 day')  THEN 1 ELSE 0 END) AS last_1d,
                 SUM(CASE WHEN published_at >= datetime('now','-7 day')  THEN 1 ELSE 0 END) AS last_7d,
                 SUM(CASE WHEN published_at >= datetime('now','-30 day') THEN 1 ELSE 0 END) AS last_30d
               FROM papers;
               SELECT MAX(published_at) AS newest, MIN(published_at) AS oldest FROM papers;" \
              || echo "::warning::sqlite3 diagnostic query failed (non-fatal)"
            echo "=== end arxiv-graph DB stats ==="
          else
            echo "::warning::sqlite3 unavailable after install attempt; skipping DB stats (digest will still run)"
          fi

      - name: Run digest (dry-run preview)
        run: uv run research-digest run --top 10 --since-days 7 --dry-run

      - name: Run digest + email
        run: uv run research-digest run --top 10 --email --since-days 7

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Digest] Daily run failed on ${new Date().toISOString().slice(0,10)}`,
              body: `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ["bug", "automated"]
            })
